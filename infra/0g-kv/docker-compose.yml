# FINAL_BUILD_PLAN.md Block F · 0G KV self-host docker-compose.
#
# Brings up the operator-side stack that backs Ivaronix's HttpKvClient:
#   - 0G Storage zgs_kv binary (Rust) → signs + commits to the KV log contract on chain
#   - MongoDB / Elasticsearch / Milvus / Redis (4-tier storage for EverMemOS)
#   - EverMemOS REST server on :1995 (the HTTP API the HttpKvClient hits)
#
# Total footprint: ~4GB RAM, 8GB disk for indexed data.
#
# Operator runbook:
#   cp ../../.env .env.kv                  # copy IVARONIX_SIGNER_KEY for chain auth
#   docker compose -f docker-compose.yml up -d
#   curl http://localhost:1995/api/v1/users/register -X POST
#   # → returns an API key. Set KV_REMOTE_URL=http://localhost:1995 + KV_API_KEY=<key>
#   # in apps/studio/.env.local to wire Studio against the real backend.
#
# After bring-up, Studio's createKvClient() returns HttpKvClient
# instead of InMemoryKvClient — memory survives process restarts,
# cross-session reads work, and the chain-grant middleware enforces
# CapabilityRegistryV2 grants on every read.

version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ivaronix-kv-mongo
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ivaronix-kv-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      retries: 10

  # Milvus etcd sidecar (per upstream 3-container pattern). The
  # standalone-with-embedded-etcd mode SIGSEGVs in InitEtcdServer on
  # Windows Docker Desktop (reproducible across volume wipes); the
  # 3-container pattern from oglabs resources/0g-memory/docker-compose.yaml
  # is the known-good config that ships on Hetzner production too.
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ivaronix-kv-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://milvus-etcd:2479 -listen-client-urls http://0.0.0.0:2479 --data-dir /etcd
    volumes:
      - milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2479"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: ivaronix-kv-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus-minio-data:/minio_data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.2
    container_name: ivaronix-kv-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2479
      MINIO_ADDRESS: milvus-minio:9000
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: ivaronix-kv-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  evermemos:
    # The EverMemOS REST server that fronts zgs_kv + the four storage tiers.
    # Source: oglabs resources/0g-memory/0g_kv_server/Dockerfile rebuilt as
    # an Ivaronix-tagged image. For first bring-up, build locally; v1.1 may
    # ship a published image once the upstream version stabilises.
    image: ivaronix/evermemos:0.1.0
    container_name: ivaronix-kv-evermemos
    build:
      # Path uses a literal space (not backslash-escape, which is shell
      # syntax and breaks the Windows compose builder). The directory
      # `oglabs resources/` is gitignored at repo root per .gitignore.
      context: "../../oglabs resources/0g-memory"
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.kv  # IVARONIX_SIGNER_KEY for zgs_kv chain writes
    volumes:
      # Bind-mount .env.kv as /app/.env so the Python load_env helper
      # inside the EverMemOS image finds it (the in-container code reads
      # /app/.env directly via dotenv; env_file alone doesn't satisfy
      # that path). Fixes the "Environment setup failed, exiting program"
      # bring-up failure caught during P0 testing.
      - ./.env.kv:/app/.env:ro
    environment:
      # MongoDB — EverMemOS reads MONGODB_HOST/PORT (or MONGODB_URI). Use individual
      # vars so the noauth compose mongo accepts the connection (upstream's
      # MONGODB_USERNAME/PASSWORD only apply when mongo is auth-enabled).
      MONGODB_HOST: mongo
      MONGODB_PORT: "27017"
      MONGODB_DATABASE: memsys
      # Elasticsearch — EverMemOS reads ES_HOSTS (NOT ELASTIC_URL). Container
      # DNS name `elasticsearch` resolves inside the compose network. The :9200
      # port is the in-container port (NOT the host-mapped :19200 in upstream's
      # standalone compose). Fixing this is the Q16 unblocker.
      ES_HOSTS: "http://elasticsearch:9200"
      ES_VERIFY_CERTS: "false"
      SELF_ES_INDEX_NS: memsys
      # Milvus — EverMemOS reads MILVUS_HOST/PORT (NOT MILVUS_URL).
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      SELF_MILVUS_COLLECTION_NS: memsys
      # Redis — EverMemOS reads REDIS_HOST/PORT (NOT REDIS_URL).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "8"
      REDIS_SSL: "false"
      # 0G network — EverMemOS reads ZEROG_* (NOT ZG_*). Match upstream
      # env.template.0g.example exactly so the in-container code sees the
      # right values.
      ZEROG_READ_NODE: "http://host.docker.internal:6789"
      ZEROG_RPC_URL: "https://evmrpc-testnet.0g.ai"
      ZEROG_INDEXER_URL: "https://indexer-storage-testnet-turbo.0g.ai"
      ZEROG_FLOW_ADDRESS: "0x22E03a6A89B950F1c82ec5e74F8eCa321a105296"
      KV_STORAGE_TYPE: zerog
      # Skip the heavy startup re-sync on every bring-up; this avoids long
      # bring-up stalls and lets the gateway serve reads quickly. EverMemOS
      # syncs on write naturally.
      STARTUP_SYNC_ENABLED: "false"
      LOG_LEVEL: INFO
      ENV: dev
      # Local API port — preserved for HttpKvClient REST baseUrl :1995.
      API_BASE_URL: "http://localhost:1995"
    ports:
      - "1995:1995"

volumes:
  mongo-data:
  elastic-data:
  milvus-data:
  milvus-etcd-data:
  milvus-minio-data:
