specVersion: 0.0.7
description: Ivaronix marketplace + payment subgraph (FINAL_BUILD_PLAN.md Block O)
repository: https://github.com/Pratiikpy/ivaronix
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: SkillRegistryV2
    network: 0g-galileo
    source:
      address: '0xF05113E83146160024326ff30979c57f5adc2193'
      abi: SkillRegistryV2
      startBlock: 33000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/skill-registry.ts
      entities:
        - Skill
        - GlobalStats
      abis:
        - name: SkillRegistryV2
          file: ./abis/SkillRegistryV2.json
      eventHandlers:
        - event: SkillPublished(indexed bytes32,indexed bytes32,indexed address,bytes32)
          handler: handleSkillPublished
        - event: SkillOwnershipTransferred(indexed bytes32,indexed address,indexed address)
          handler: handleSkillOwnershipTransferred

  - kind: ethereum/contract
    name: SkillPricing
    network: 0g-galileo
    source:
      address: '0xc3369C9BD74D81E9c7226e5fc9427D19c12B718F'
      abi: SkillPricing
      startBlock: 33040000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/skill-pricing.ts
      entities:
        - Skill
      abis:
        - name: SkillPricing
          file: ./abis/SkillPricing.json
      eventHandlers:
        - event: PriceUpdated(indexed bytes32,indexed address,uint256,uint16,uint16)
          handler: handlePriceUpdated
        - event: PriceUnset(indexed bytes32,indexed address)
          handler: handlePriceUnset

  - kind: ethereum/contract
    name: SkillRunPayment
    network: 0g-galileo
    source:
      address: '0x9eA5FDba913AC94dA8833Fee21F2832827950A5C'
      abi: SkillRunPayment
      startBlock: 33040000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/skill-run-payment.ts
      entities:
        - Payment
        - CreatorStats
        - Withdrawal
        - Skill
        - GlobalStats
      abis:
        - name: SkillRunPayment
          file: ./abis/SkillRunPayment.json
      eventHandlers:
        - event: SkillRunPaid(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint16,uint16,uint64)
          handler: handleSkillRunPaid
        - event: Withdrawn(indexed address,uint256,bool)
          handler: handleWithdrawn
        - event: Refunded(indexed bytes32,indexed address,uint256,uint64)
          handler: handleRefunded

  - kind: ethereum/contract
    name: ReceiptRegistryV3
    network: 0g-galileo
    source:
      address: '0x7396D536594e2BE833070c7EB441A10906046257'
      abi: ReceiptRegistry
      startBlock: 33000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/receipt-registry.ts
      entities:
        - Receipt
        - Skill
        - GlobalStats
      abis:
        - name: ReceiptRegistry
          file: ./abis/ReceiptRegistry.json
      eventHandlers:
        - event: ReceiptAnchored(indexed uint256,indexed address,indexed bytes32,bytes32,bytes32,uint8,uint64)
          handler: handleReceiptAnchored

  - kind: ethereum/contract
    name: MemoryAccessLogV2
    network: 0g-galileo
    source:
      address: '0x2e2a5872C4d1d3a8a07c5B8aD1Cb18b3fA9a55cF'
      abi: MemoryAccessLog
      startBlock: 33000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/memory-access-log.ts
      entities:
        - MemoryAccess
      abis:
        - name: MemoryAccessLog
          file: ./abis/MemoryAccessLog.json
      eventHandlers:
        - event: MemoryAccessed(indexed address,indexed bytes32,string,uint64)
          handler: handleMemoryAccessed
