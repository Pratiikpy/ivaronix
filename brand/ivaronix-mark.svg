<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ivaronix brand mark — full version (brackets + i + green dot + wordmark)
  Extracted from Ivaronix.html static SVG thumbnail 2026-05-08.
  Tokens locked in UI_UX_GUIDE.md §3.
-->
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ivaronix">
  <title>Ivaronix</title>
  <rect width="1200" height="800" fill="#faf9f6"/>
  <g transform="translate(600,400)">
    <!-- Left bracket -->
    <path d="M -180 -180 L -240 -180 L -240 180 L -180 180"
          stroke="#1a1a1a" stroke-width="40" fill="none" stroke-linecap="square"/>
    <!-- Right bracket -->
    <path d="M 180 -180 L 240 -180 L 240 180 L 180 180"
          stroke="#1a1a1a" stroke-width="40" fill="none" stroke-linecap="square"/>
    <!-- Serif italic i -->
    <text x="0" y="100" text-anchor="middle"
          font-family="Times New Roman, Georgia, serif"
          font-style="italic" font-size="280" fill="#1a1a1a">i</text>
    <!-- Green dot of the i -->
    <circle cx="20" cy="-130" r="32" fill="#16a34a"/>
  </g>
  <!-- Wordmark -->
  <text x="600" y="700" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="22" fill="#6b6b66" letter-spacing="4">IVARONIX</text>
</svg>
