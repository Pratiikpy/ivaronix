  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  transition: background var(--t-med), color var(--t-med);\n}\n::selection { background: var(--ink); color: var(--bg); }\n\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; }\n\n/* Type primitives */\n.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }\n.serif-i { font-family: var(--serif); font-style: italic; font-weight: 400; }\n.mono { font-family: var(--mono); font-size: 0.86em; letter-spacing: 0; }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--muted);\n  font-weight: 500;\n}\n\n.wrap { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }\n.section { max-width: var(--max); margin: 0 auto; padding: 5.5rem 2rem; }\n@media (max-width: 900px) { .section { padding: 3.5rem 1.25rem; } }\n\n.rule { height: 1px; background: var(--line-soft); border: 0; margin: 0; }\n.rule-strong { height: 1px; background: var(--ink); border: 0; margin: 0; }\n\n/* Section heads — Blank style: eyebrow, big tight serif, lead */\n.section-eyebrow {\n  display: inline-block;\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--muted);\n  margin-bottom: 1.25rem;\n  font-weight: 500;\n}\n\n.section-title {\n  font-family: var(--sans);\n  font-size: clamp(2.25rem, 4.5vw, 3.5rem);\n  font-weight: 700;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  color: var(--ink-2);\n  margin: 0 0 1rem;\n  max-width: 900px;\n}\n.section-title em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--ink-3); letter-spacing: -0.015em; font-size: 1.14em; line-height: 0.92; vertical-align: -0.03em; }\n\n.section-lead {\n  font-size: 1.15rem;\n  color: var(--muted);\n  max-width: 620px;\n  margin: 0 0 3rem;\n  line-height: 1.55;\n}\n\n/* Display headings */\nh1, h2, h3, h4 { margin: 0; font-weight: 400; color: var(--ink-2); }\n\n.display {\n  font-family: var(--sans);\n  font-size: clamp(2.75rem, 7vw, 5.5rem);\n  font-weight: 700;\n  line-height: 1.02;\n  letter-spacing: -0.035em;\n  color: var(--ink-2);\n}\n.display em {\n  font-family: var(--serif);\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink-3);\n  letter-spacing: -0.02em;\n  font-size: 1.18em;\n  line-height: 0.9;\n  vertical-align: -0.04em;\n  padding-right: 0.04em;\n}\n\n.h2 {\n  font-family: var(--sans);\n  font-size: clamp(2.25rem, 4.5vw, 3.5rem);\n  font-weight: 700;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  color: var(--ink-2);\n}\n.h2 em {\n  font-family: var(--serif);\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink-3);\n  letter-spacing: -0.015em;\n  font-size: 1.14em;\n  line-height: 0.92;\n  vertical-align: -0.03em;\n}\n\n.h3 {\n  font-family: var(--sans);\n  font-size: clamp(1.5rem, 2.4vw, 2rem);\n  font-weight: 600;\n  line-height: 1.15;\n  letter-spacing: -0.015em;\n  color: var(--ink-2);\n}\n.h4 {\n  font-family: var(--sans);\n  font-size: 1.25rem;\n  font-weight: 600;\n  line-height: 1.25;\n  letter-spacing: -0.01em;\n  color: var(--ink-2);\n}\n\n.lead {\n  font-size: clamp(1.05rem, 1.4vw, 1.25rem);\n  line-height: 1.55;\n  color: var(--muted);\n  max-width: 60ch;\n  font-weight: 400;\n}\n.lead-sm {\n  font-size: 1rem;\n  line-height: 1.55;\n  color: var(--muted);\n  max-width: 56ch;\n}\n\n/* Buttons — pill, Blank-flavored */\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 12px 22px;\n  font-family: var(--sans);\n  font-size: 14px; letter-spacing: -0.005em;\n  font-weight: 500;\n  border: 1px solid var(--ink-2);\n  background: transparent;\n  color: var(--ink-2);\n  cursor: pointer;\n  border-radius: 999px;\n  transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast);\n  white-space: nowrap;\n}\n.btn:hover { background: var(--ink-2); color: var(--bg); }\n.btn-solid { background: var(--ink-2); color: var(--bg); }\n.btn-solid:hover { background: var(--ink); }\n.btn-ghost { border-color: transparent; padding-left: 6px; padding-right: 6px; color: var(--muted); }\n.btn-ghost:hover { background: transparent; color: var(--ink-2); }\n.btn-sm { padding: 8px 14px; font-size: 13px; }\n.btn-lg { padding: 14px 26px; font-size: 15px; }\n\n/* Tag — small mono pill */\n.tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.04em;\n  padding: 4px 10px;\n  border: 1px solid var(--line);\n  color: var(--muted);\n  border-radius: 999px;\n  background: var(--bg);\n}\n.tag-strong { border-color: var(--ink-2); color: var(--ink-2); }\n.tag-dot::before { content: \"\"; width: 5px; height: 5px; border-radius: 50%; background: var(--ink-2); display: inline-block; }\n.tag-live::before { content: \"\"; width: 6px; height: 6px; border-radius: 50%; background: #16a34a; display: inline-block; animation: pulse 2s infinite; }\n@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }\n\n/* Step / card — Blank's .ll-step */\n.step {\n  padding: 2rem;\n  background: var(--bg);\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  transition: border-color 0.2s ease, transform 0.2s ease;\n  display: block;\n}\n.step:hover { border-color: var(--ink-2); transform: translateY(-2px); }\n\n.step-num {\n  display: inline-flex;\n  align-items: center; justify-content: center;\n  width: 40px; height: 40px;\n  border-radius: 10px;\n  background: var(--ink-2);\n  color: var(--bg);\n  font-weight: 700; font-size: 1rem;\n  margin-bottom: 1.5rem;\n  font-variant-numeric: tabular-nums;\n  font-family: var(--sans);\n}\n\n.step h3 {\n  font-family: var(--sans);\n  font-size: 1.25rem;\n  font-weight: 600;\n  letter-spacing: -0.015em;\n  margin: 0 0 0.5rem;\n}\n.step p {\n  color: var(--muted);\n  font-size: 0.95rem;\n  line-height: 1.55;\n  margin: 0;\n}\n.step-tag {\n  display: inline-block;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 0.75rem;\n}\n\n/* Nav — Blank-flavored sticky */\n.ix-nav {\n  position: sticky; top: 0; z-index: 50;\n  background: color-mix(in oklab, var(--bg) 85%, transparent);\n  backdrop-filter: saturate(180%) blur(20px);\n  -webkit-backdrop-filter: saturate(180%) blur(20px);\n  border-bottom: 1px solid var(--line-soft);\n}\n.ix-nav-inner {\n  display: flex; align-items: center; justify-content: space-between;\n  height: 64px;\n  max-width: var(--max);\n  margin: 0 auto;\n  padding: 0 var(--pad);\n}\n.ix-logo {\n  font-family: var(--sans);\n  font-weight: 600;\n  font-size: 17px; letter-spacing: -0.025em;\n  display: inline-flex; align-items: baseline; gap: 1px;\n  color: var(--ink-2);\n}\n.ix-logo .dot { color: var(--ink-2); }\n.ix-nav-links { display: flex; gap: 2px; align-items: center; }\n.ix-nav-links a {\n  font-family: var(--sans); font-size: 14px;\n  font-weight: 400;\n  letter-spacing: -0.005em;\n  color: var(--muted);\n  padding: 7px 14px;\n  border-radius: 999px;\n  transition: color var(--t-fast), background var(--t-fast);\n}\n.ix-nav-links a:hover { color: var(--ink-2); }\n.ix-nav-links a.active { color: var(--ink-2); background: var(--paper); }\n.ix-nav-cta { display: flex; gap: 8px; align-items: center; }\n\n.theme-toggle {\n  width: 34px; height: 34px;\n  border: 1px solid var(--line);\n  background: transparent; color: var(--muted);\n  cursor: pointer;\n  display: inline-flex; align-items: center; justify-content: center;\n  border-radius: 999px;\n  transition: color var(--t-fast), border-color var(--t-fast);\n}\n.theme-toggle:hover { color: var(--ink-2); border-color: var(--ink-2); }\n\n/* Footer */\n.ix-foot {\n  border-top: 1px solid var(--line-soft);\n  padding: 5rem 2rem 2.5rem;\n  margin-top: 6rem;\n  max-width: var(--max);\n  margin-left: auto;\n  margin-right: auto;\n}\n.ix-foot-grid {\n  display: grid;\n  grid-template-columns: 2fr repeat(4, 1fr);\n  gap: 3rem;\n  margin-bottom: 4rem;\n}\n.ix-foot h4 {\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--muted);\n  margin: 0 0 1rem;\n  font-weight: 500;\n}\n.ix-foot ul { list-style: none; padding: 0; margin: 0; }\n.ix-foot li { margin-bottom: 0.5rem; font-size: 14px; }\n.ix-foot li a { color: var(--ink-2); transition: color var(--t-fast); }\n.ix-foot li a:hover { color: var(--ink); }\n.ix-foot-bottom {\n  display: flex; justify-content: space-between; align-items: center;\n  font-size: 12px; color: var(--muted);\n  padding-top: 1.5rem; border-top: 1px solid var(--line-soft);\n}\n.ix-foot-mark {\n  font-family: var(--sans);\n  font-size: clamp(120px, 22vw, 280px);\n  line-height: 0.85;\n  color: var(--ink-2); letter-spacing: -0.045em;\n  font-weight: 700;\n  margin: 3rem 0;\n}\n.ix-foot-mark em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--ink-3); }\n\n/* CTA section — Blank's .ll-cta */\n.cta {\n  text-align: center;\n  padding: 6rem 2rem 2rem;\n  max-width: 900px;\n  margin: 0 auto;\n}\n.cta .display { margin-bottom: 1.5rem; }\n.cta-actions { display: flex; gap: 12px; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }\n\n/* utility */\n.kbd {\n  display: inline-block;\n  font-family: var(--mono); font-size: 11px;\n  padding: 2px 7px;\n  border: 1px solid var(--line);\n  border-radius: 6px;\n  color: var(--ink-2);\n  background: var(--bg-sub);\n}\n.dot-sep::before { content: \"·\"; margin: 0 8px; color: var(--ink-4); }\n\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }\n.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }\n.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }\n@media (max-width: 900px) {\n  .grid-3, .grid-4 { grid-template-columns: 1fr; }\n  .grid-2 { grid-template-columns: 1fr; }\n  .ix-foot-grid { grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem; }\n  .ix-nav-links { display: none; }\n}\n\n/* ─────────────────────────────────────────────────────────\n   Legacy aliases — keep older pages compatible with the new\n   Blank-style system. These map old class names/tokens onto\n   the new Outfit/700 + JetBrains Mono editorial rhythm.\n   ───────────────────────────────────────────────────────── */\n\n/* Legacy color tokens used in inline styles on other pages */\n:root {\n  --rule-soft: var(--line-soft);\n  --rule-softer: var(--line-softer);\n  --rule: var(--line);\n}\n\n/* Old `.section-head` — was a 280/1fr grid with eyebrow on the left.\n   Re-style as a stacked Blank-style block. */\n.section-head {\n  display: block;\n  margin-bottom: 3rem;\n  max-width: 900px;\n}\n.section-head .section-eyebrow {\n  display: inline-block;\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--muted);\n  margin-bottom: 1.25rem;\n  font-weight: 500;\n}\n/* Hide the old bullet inside legacy eyebrows so they read as text-only */\n.section-head .section-eyebrow .dot {\n  display: none;\n}\n.section-head .section-eyebrow::before {\n  content: \"— \";\n  color: var(--muted);\n}\n\n/* Old `.h2` rule used a serif. Map onto Blank-style sans 700. */\n.h2 {\n  font-family: var(--sans);\n  font-size: clamp(2.25rem, 4.5vw, 3.5rem);\n  font-weight: 700;\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  color: var(--ink-2);\n  margin: 0 0 1rem;\n}\n.h2 em {\n  font-family: var(--serif);\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink-3);\n  letter-spacing: -0.01em;\n}\n\n.h3 em, .h4 em, .display em {\n  font-family: var(--serif);\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink-3);\n}\n\n/* Lead text helpers used by older pages */\n.lead-sm { color: var(--muted); }\n\n/* Old `.eyebrow` — keep visible, restyle */\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--muted);\n  font-weight: 500;\n}\n\n/* Pages that used .wrap > .section-head */\n.wrap > .section-head .section-eyebrow,\n.section .section-eyebrow {\n  margin-bottom: 1.25rem;\n}\n\n/* Code/inline tokens */\ncode {\n  font-family: var(--mono);\n  font-size: 0.86em;\n  background: var(--paper);\n  padding: 0.1em 0.4em;\n  border-radius: 4px;\n  color: var(--ink-2);\n}\npre {\n  font-family: var(--mono);\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 1.25rem;\n  overflow-x: auto;\n  font-size: 13px;\n  line-height: 1.55;\n  color: var(--ink-2);\n}\npre code {\n  background: transparent;\n  padding: 0;\n  font-size: inherit;\n}\n<\u002Fstyle>\n<style>/* ─────────────────────────────────────────────────────────\n   Ivaronix Brand — logo, four-light row, drop-zone, components\n   ───────────────────────────────────────────────────────── */\n\n/* Logo mark — geometric Ɪ with a chain-anchor dot */\n.ix-mark {\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n  font-family: var(--sans);\n  font-weight: 600;\n  font-size: 17px;\n  letter-spacing: -0.025em;\n  color: var(--ink-2);\n  line-height: 1;\n}\n.ix-mark-glyph {\n  width: 22px;\n  height: 22px;\n  position: relative;\n  display: inline-block;\n}\n.ix-mark-glyph svg { display: block; }\n.ix-mark .name { position: relative; }\n.ix-mark .name::after {\n  content: \"\";\n  display: inline-block;\n  width: 4px;\n  height: 4px;\n  border-radius: 50%;\n  background: #16a34a;\n  margin-left: 4px;\n  vertical-align: 1px;\n  animation: pulse 2s infinite;\n}\n.ix-mark.no-pulse .name::after { display: none; }\n\n.ix-mark-large {\n  font-size: 24px;\n  gap: 12px;\n}\n.ix-mark-large .ix-mark-glyph { width: 30px; height: 30px; }\n\n/* Four-Light Status Row — the cross-cutting brand component */\n.fourlight {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  overflow: hidden;\n  background: var(--bg-elev);\n}\n.fourlight .lt {\n  padding: 14px 18px;\n  border-right: 1px solid var(--line-soft);\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  position: relative;\n}\n.fourlight .lt:last-child { border-right: 0; }\n.fourlight .dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--line);\n  flex-shrink: 0;\n  position: relative;\n}\n.fourlight .lt.ok .dot { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }\n.fourlight .lt.live .dot { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.12); animation: pulse 2s infinite; }\n.fourlight .lt.warn .dot { background: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.12); }\n.fourlight .lt.work .dot { background: var(--ink-2); animation: pulse 1s infinite; }\n.fourlight .lt.burn .dot { background: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.18); animation: pulse 1.2s infinite; }\n.fourlight .lt .lab {\n  display: block;\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 2px;\n}\n.fourlight .lt .val {\n  display: block;\n  font-family: var(--sans);\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--ink-2);\n  letter-spacing: -0.005em;\n}\n@media (max-width: 720px) {\n  .fourlight { grid-template-columns: 1fr 1fr; }\n  .fourlight .lt:nth-child(2) { border-right: 0; }\n  .fourlight .lt:nth-child(-n+2) { border-bottom: 1px solid var(--line-soft); }\n}\n\n/* Burn Mode visual treatment — purple/sealed */\n.fourlight.burn-mode { border-color: rgba(124,58,237,0.28); background: linear-gradient(180deg, rgba(124,58,237,0.04) 0%, var(--bg-elev) 100%); }\n.fourlight.burn-mode .lt { border-right-color: rgba(124,58,237,0.10); }\n\n/* Drop-zone hero — full-bleed input */\n.dropzone {\n  border: 1.5px dashed var(--line);\n  border-radius: 24px;\n  padding: 3rem 2rem;\n  background: var(--bg-elev);\n  text-align: center;\n  transition: border-color 0.2s, background 0.2s, transform 0.2s;\n  cursor: pointer;\n  position: relative;\n  overflow: hidden;\n}\n.dropzone:hover { border-color: var(--ink-2); background: var(--bg); }\n.dropzone.dragover { border-color: var(--ink-2); background: var(--paper); transform: scale(1.005); }\n.dropzone .ic {\n  width: 60px; height: 60px; margin: 0 auto 1rem;\n  border: 1.5px dashed var(--line);\n  border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  color: var(--muted);\n}\n.dropzone h3 {\n  font-family: var(--sans);\n  font-size: 1.5rem;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  margin: 0 0 0.5rem;\n  color: var(--ink-2);\n}\n.dropzone h3 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--ink-3); }\n.dropzone p { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }\n.dropzone .opts {\n  display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;\n  margin-top: 1.5rem;\n  padding-top: 1.5rem;\n  border-top: 1px solid var(--line-soft);\n}\n.dropzone .opts .opt {\n  padding: 6px 12px;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.02em;\n  color: var(--muted);\n  cursor: pointer;\n  transition: all var(--t-fast);\n}\n.dropzone .opts .opt:hover { border-color: var(--ink-2); color: var(--ink-2); }\n.dropzone .opts .opt.on { border-color: var(--ink-2); color: var(--ink-2); background: var(--paper); }\n\n/* Permission pill */\n.pp {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 4px 10px;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  font-family: var(--mono); font-size: 10.5px;\n  color: var(--muted);\n  letter-spacing: 0.02em;\n}\n.pp.allow { border-color: rgba(22,163,74,0.30); color: #16a34a; background: rgba(22,163,74,0.04); }\n.pp.deny  { border-color: rgba(239,68,68,0.30); color: #dc2626; background: rgba(239,68,68,0.03); }\n.pp.warn  { border-color: rgba(217,119,6,0.30); color: #b45309; background: rgba(217,119,6,0.04); }\n.pp::before { content: \"\"; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.6; }\n\n/* Receipt verify — 3-state checklist */\n.verify-list { list-style: none; padding: 0; margin: 0; }\n.verify-row {\n  display: grid;\n  grid-template-columns: 1fr auto auto;\n  gap: 1rem;\n  align-items: center;\n  padding: 0.75rem 0;\n  border-bottom: 1px dashed var(--line-soft);\n  font-size: 13px;\n}\n.verify-row:last-child { border-bottom: 0; }\n.verify-row .k { color: var(--muted); font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.02em; }\n.verify-row .v { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }\n.verify-row .stat {\n  font-family: var(--mono); font-size: 11px;\n  letter-spacing: 0.06em; text-transform: uppercase;\n  font-weight: 500;\n}\n.verify-row .stat.pass { color: #16a34a; }\n.verify-row .stat.pass::before { content: \"✓ \"; }\n.verify-row .stat.pending { color: var(--muted); }\n.verify-row .stat.pending::before { content: \"· \"; }\n\n.verify-stage {\n  margin-top: 1rem;\n  padding-top: 1rem;\n  border-top: 1px solid var(--line-soft);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n  font-weight: 500;\n}\n.verify-stage .badge {\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: rgba(22,163,74,0.10);\n  color: #16a34a;\n  border: 1px solid rgba(22,163,74,0.20);\n}\n\n/* Tile strip — 4 receipt tiles for the public proof URL */\n.tile-strip {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0.5rem;\n}\n@media (max-width: 720px) { .tile-strip { grid-template-columns: 1fr 1fr; } }\n.tile {\n  padding: 1.25rem 1rem;\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  background: var es. Action creates risk. Ivaronix gives every important AI action a receipt — and gives users a way to govern memory, skills, and permissions before action happens.\n  <\u002Fp>\n\n  <div class=\"diff\">\n    <div class=\"diff-col\">\n      <h4>— Today's AI<\u002Fh4>\n      <ul>\n        <li>You can't see what data the agent touched<\u002Fli>\n        <li>Skills run with full access, no permission labels<\u002Fli>\n        <li>One model answers — no second opinion<\u002Fli>\n        <li>Sensitive data lingers in caches and embeddings<\u002Fli>\n        <li>Memory is the vendor's, not yours<\u002Fli>\n        <li>No proof the action ever happened<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"diff-col right\">\n      <h4>— Ivaronix<\u002Fh4>\n      <ul>\n        <li>Memory Permission Center governs every access<\u002Fli>\n        <li>Agent Safety Guard labels &amp; limits skill risk<\u002Fli>\n        <li>5-role adjudicated consensus across specialists<\u002Fli>\n        <li>Burn Mode destroys the session key after use<\u002Fli>\n        <li>Wallet-owned, encrypted memory on 0G Storage<\u002Fli>\n        <li>Action Receipts anchored on 0G Chain<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- KILLER DEMO -->\n<section class=\"section\">\n  <div class=\"section-eyebrow\">— Killer demo · One workflow, full stack<\u002Fdiv>\n  <h2 class=\"section-title\">Drop → consensus → burn → <em>receipt<\u002Fem>.<\u002Fh2>\n  <p class=\"section-lead\">\n    One workflow that proves the entire OS. Upload a confidential contract. Run 5-role consensus across specialist models. Destroy the session key. Walk away with a verifiable receipt anchored on 0G Chain — and a public proof URL anyone can verify.\n  <\u002Fp>\n\n  <div class=\"killer-strip\">\n    <div class=\"killer-cell\">\n      <div class=\"step\">— 01 Drop<\u002Fdiv>\n      <h4>Encrypted <em>upload<\u002Fem><\u002Fh4>\n      <p>AES-256-GCM client-side ronix Studio<\u002Fh4>\n      <p>Drop-zone, skill browser, proof URLs, passport, memory center.<\u002Fp>\n      <span class=\"arrow\">Open Studio →<\u002Fspan>\n    <\u002Fa>\n    <a href=\"forge.html\" class=\"surface\">\n      <div class=\"num\">— 02 FORGE CLI<\u002Fdiv>\n      <h4>Ivaronix Forge<\u002Fh4>\n      <p>plan · build · audit · doc · swarm · watch · receipt.<\u002Fp>\n      <span class=\"arrow\">Install Forge →<\u002Fspan>\n    <\u002Fa>\n    <a href=\"api.html\" class=\"surface\">\n      <div class=\"num\">— 03 API<\u002Fdiv>\n      <h4>Ivaronix API<\u002Fh4>\n      <p>OpenAI-compatible + memory, skills, consensus, receipts.<\u002Fp>\n      <span class=\"arrow\">Read API ref →<\u002Fspan>\n    <\u002Fa>\n    <a href=\"skills.html\" class=\"surface\">\n      <div class=\"num\">— 04 REGISTRY<\u002Fdiv>\n      <h4>Skill Registry<\u002Fh4>\n      <p>50+ verified skills · permission pills · sandbox preview.<\u002Fp>\n      <span class=\"arrow\">Browse skills →<\u002Fspan>\n    <\u002Fa>\n    <a href=\"pricing.html\" class=\"surface\">\n      <div class=\"num\">— 05 TRUST LAYER<\u002Fdiv>\n      <h4>For teams<\u002Fh4>\n      <p>Workspaces, policies, approvals, audit logs. <em>Phase 3.<\u002Fem><\u002Fp>\n      <span class=\"arrow\">See pricing →<\u002Fspan>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- SIGNATURE 5-LAYER STACK -->\n<section class=\"stack-section\">\n  <div class=\"wrap\">\n    <div class=\"section-eyebrow\">— Five layers, one OS<\u002Fdiv>\n    <h2 class=\"section-title\" style=\"max-width: 22ch;\">Memory. Skills. Consensus. Burn. <em>Receipts<\u002Fem>.<\u002Fh2>\n    <p class=\"section-lead\" style=\"max-width: 60ch;\">Hover any layer. The other four fall back. This is how Ivaronix actually composes — translucent, ordered, every layer earning its place.<\u002Fp>\n\n    <div class=\"stack-stage\">\n      <div class=\"stack-card\" data-i=\"0\">\n        <div class=\"num\">— 01 / Memory<\u002Fdiv>\n        <h3>Wallet-owned <em>memory<\u002Fem><\u002Fh3>\n        <p>Hybrid vector + temporal graph + SQLite/FTS5 + KV. AES-256-GCM. Encrypted on 0G Storage. The user's wallet holds the key — never us.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-i=\"1\">\n        <div class=\"num\">— 02 / Skills<\u002Fdiv>\n        <h3>Permissioned <em>skill runtime<\u002Fem><\u002Fh3>\n        <p>Every skill ships a manifest, scanner, and sandbox. Permissions are gated, decisions logged, manifest hashes anchored on 0G Chain.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-i=\"2\">\n        <div class=\"num\">— 03 / Consensus<\u002Fdiv>\n        <h3>Adjudicated <em>5-role<\u002Fem><\u002Fh3>\n        <p>Analyst · Risk · Evidence · Red-Team · Judge — each in a sealed TEE. The verdict ships with five attestation hashes, not one.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-i=\"3\">\n        <div class=\"num\">— 04 / Burn<\u002Fdiv>\n        <h3>Burn <em>mode<\u002Fem><\u002Fh3>\n        <p>Session keys destroyed on completion. Document ciphertext stays; plaintext is unrecoverable — even by us. The receipt records that fact.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-i=\"4\">\n        <div class=\"num\">— 05 / Receipts<\u002Fdiv>\n        <h3>Action <em>receipts<\u002Fem><\u002Fh3>\n        <p>Manifest + storage root + TEE attestations + policy decision + ordering proof, anchored on 0G Chain. One URL. Forever verifiable.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- SEVEN LAYERS -->\n<section class=\"section\">\n  <div class=\"section-eyebrow\">— Architecture<\u002Fdiv>\n  <h2 class=\"section-title\">Seven layers, every one <em>best-of-class<\u002Fem>.<\u002Fh2>\n  <p class=\"section-lead\">\n    Each layer maps to a 0G primitive and benchmarks against the strongest single-purpose project in the ecosystem. Memory, identity, skills, action, consensus, receipts, reputation — under one OS.\n  <\u002Fp>\n\n  <div class=\"layer-grid\">\n    <div class=\"layer\">\n      <div class=\"num\">L1 / IDENTITY<\u002Fdiv>\n      <h3>ERC-7857 Agent <em>Passport<\u002Fem><\u002Fh3>\n      <p>Wallet-bound. Owner, model history, memory root, skill manifest root, permission profile, trust score, receipt count, namespace roots, milestones.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">ERC-7857 INFT<\u002Fspan><span class=\"tag\">on-chain events<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\">\n      <div class=\"num\">L2 / MEMORY<\u002Fdiv>\n      <h3>Wallet-owned <em>memory<\u002Fem><\u002Fh3>\n      <p>Hybrid: vector + temporal graph + SQLite/FTS5 + KV. AES-256-GCM. 0G Sealed Inference for fact extraction. CapabilityRegistry + MemoryAccessLog.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">0G Storage<\u002Fspan><span class=\"tag\">Sealed Inference<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\">\n      <div class=\"num\">L3 / SKILLS<\u002Fdiv>\n      <h3>Permissioned <em>runtime<\u002Fem><\u002Fh3>\n      <p>Manifest + scanner + sandbox + permission gate. awesome-claude-skills compatible. MCP-compatible. SkillRegistry.sol anchors manifest hashes.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">50+ skills<\u002Fspan><span class=\"tag\">on-chain registry<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\">\n      <div class=\"num\">L4 / ACTION<\u002Fdiv>\n      <h3>Policy &amp; <em>safety<\u002Fem><\u002Fh3>\n      <p>Safe Autonomy Slider — Observe → Suggest → Draft → Approve → Auto. Allowlists, spend caps, dry-run, emergency stop, incident log.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">Safety Guard<\u002Fspan><span class=\"tag\">policy engine<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\">\n      <div class=\"num\">L5 / CONSENSUS<\u002Fdiv>\n      <h3>Adjudicated <em>5-role<\u002Fem><\u002Fh3>\n      <p>Analyst · Risk Reviewer · Evidence Checker · Red-Team Critic · Final Judge. Independent TEE verify per role. 7-gate pre-flight fail-fast.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">TEE-verified<\u002Fspan><span class=\"tag\">cycle memory<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\">\n      <div class=\"num\">L6 / RECEIPTS<\u002Fdiv>\n      <h3>9 receipt <em>types<\u002Fem><\u002Fh3>\n      <p>doc_ask · audit · consensus · burn · memory_access · skill_exec · code_change · passport_update · swarm. Schema → Storage → Chain → TEE.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">RECEIPTS_SPEC<\u002Fspan><span class=\"tag\">3-state verify<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layer\" style=\"grid-column: span 2;\">\n      <div class=\"num\">L7 / REPUTATION + ECONOMY<\u002Fdiv>\n      <h3>Verified actions become <em>reputation<\u002Fem><\u002Fh3>\n      <p>Conviction-strikes (MUSASHI) + ELO (Provus). Stored on the passport. Updated by receipts, policy compliance, skill outcomes, user approvals, and outcome-resolved post-hoc adjustments. Phase 4 economy: agent wallets, escrow, revenue splits, pay-per-run skills.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">passport-anchored<\u002Fspan><span class=\"tag\">economy designed now, shipped later<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ON-CHAIN STATS -->\n<section class=\"section\">\n  <div class=\"section-eyebrow\">— On 0G<\u002Fdiv>\n  <h2 class=\"section-title\">0G built the infra. Ivaronix is the <em>product<\u002Fem>.<\u002Fh2>\n  <p class=\"section-lead\">\n    0G Compute powers private/verifiable inference via Sealed Inference (Intel TDX + NVIDIA H100 TEE). Storage holds encrypted memory, docs, skills, logs, and receipts. Chain anchors receipts, identity, reputation, skill manifests. DA scales event availability.\n  <\u002Fp>\n\n  <div class=\"stat-row\">\n    <div class=\"stat-cell\">\n      <div class=\"num\">12 s=\"btn btn-solid btn-sm\" id=\"laRun\">Run audit →<\u002Fbutton>\n          <button class=\"preset\" data-preset=\"reentrancy\">Reentrancy demo<\u002Fbutton>\n          <button class=\"preset\" data-preset=\"overflow\">Integer overflow<\u002Fbutton>\n          <button class=\"preset\" data-preset=\"auth\">Missing auth<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"la-output\">\n        <div class=\"empty\" id=\"laEmpty\">— Output will appear here. The audit runs Claude haiku-4-5 in your browser, framed as Ivaronix\\'s sealed-inference output.<\u002Fdiv>\n        <pre id=\"laOut\" style=\"display:none\"><\u002Fpre>\n        <div class=\"receipt-stub\" id=\"laReceipt\" style=\"display:none\">\n          — receipt: <b id=\"laRcptId\">rcpt_0x…<\u002Fb> · TEE 1/1 · <a href=\"proof.html\">view on Proof Explorer →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- MANIFESTO -->\n<section class=\"manifesto-block\">\n  <div class=\"section-eyebrow\">— Manifesto<\u002Fdiv>\n  <p class=\"manifesto-quote\">\n    Your AI should remember you <em>without owning you<\u002Fem>. It should act within visible limits. Every action it takes should leave a receipt.\n  <\u002Fp>\n  <p class=\"manifesto-attr\">— Ivaronix · 2026<\u002Fp>\n  <a href=\"manifesto.html\" class=\"btn\" style=\"margin-top: 1rem;\">Read the full manifesto →<\u002Fa>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- PERSONAS -->\n<section class=\"section\">\n  <div class=\"section-eyebrow\">— Built for<\u002Fdiv>\n  <h2 class=\"section-title\">For users, devs, teams, <em>and creators<\u002Fem>.<\u002Fh2>\n\n  <div class=\"persona-row\">\n    <div class=\"persona\">\n      <div class=\"lab\">— Users<\u002Fdiv>\n      <div class=\"quote\">\"Private agents that read my docs, remember context, burn secrets, and prove what they did.\"<\u002Fdiv>\n      <div class=\"who\">Freelancers · Researchers · Investors<\u002Fdiv> →<\u002Fspan>\n    <\u002Fa>\n    <a href=\"memory.html\" class=\"step\">\n      <div class=\"step-tag\">— Govern<\u002Fdiv>\n      <h3>Memory <em>Center<\u002Fem><\u002Fh3>\n      <p style=\"margin-bottom: 1.5rem;\">Memories, permissions, access log. Phone-style three-tab UX for governing what your agents remember and what they can touch.<\u002Fp>\n      <span class=\"step-tag\" style=\"margin: 0; color: var(--ink-2);\">Open memory center →<\u002Fspan>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta\">\n  <h2 class=\"display\">Your AI should <em>prove<\u002Fem> what it did.<\u002Fh2>\n  <p class=\"lead\" style=\"margin: 1rem auto 0; text-align: center;\">Live on 0G Galileo testnet. Operator Pays Mode is on — connect a wallet for identity and try it without paying gas.<\u002Fp>\n  <div class=\"cta-actions\">\n    <a href=\"onboard.html\" class=\"btn btn-solid btn-lg\">Get started →<\u002Fa>\n    <a href=\"forge.html\" class=\"btn btn-lg\">Install Forge CLI<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div data-ix-foot=\"\"><\u002Fdiv>\n\n<script src=\"a00b31e2-e6ef-47c7-8acf-7009d5d960ad\"><\u002Fscript>\n<script>\n(function () {\n  const input = document.getElementById('laInput');\n  const run = document.getElementById('laRun');\n  const empty = document.getElementById('laEmpty');\n  const out = document.getElementById('laOut');\n  const rcpt = document.getElementById('laReceipt');\n  const rcptId = document.getElementById('laRcptId');\n  if (!input || !run) return;\n\n  const presets = {\n    reentrancy: `contract Vault {\\n  mapping(address => uint) public balance;\\n  function withdraw(uint amount) public {\\n    require(balance[msg.sender] >= amount);\\n    (bool ok,) = msg.sender.call{value: amount}(\"\");\\n    require(ok);\\n    balance[msg.sender] -= amount;\\n  }\\n}`,\n    overflow: `contract Token {\\n  mapping(address => uint8) balances;\\n  function transfer(address to, uint8 amt) public {\\n    balances[msg.sender] -= amt;\\n    balances[to] += amt;\\n  }\\n}`,\n    auth: `contract Admin {\\n  address public owner;\\n  function setOwner(address newOwner) public {\\n    owner = newOwner;\\n  }\\n  function withdraw() public {\\n    payable(msg.sender).transfer(address(this).balance);\\n  }\\n}`,\n  };\n  document.querySelectorAll('.preset').forEach(b => {\n    b.addEventListener('click', () => {\n      input.value = presets[b.dataset.preset] || input.value;\n    });\n  });\n\n  function rid() {\n    const hex = '0123456789abcdef';\n    let s = 'rcpt_0x';\n    for (let i = 0; i < 12; i++) s += hex[Math.floor(Math.random() * 16)];\n    return s;\n  }\n\n  run.addEventListener('click', async () => {\n    const code = input.value.trim();\n    if (!code) return;\n    empty.style.display = 'none';\n    out.style.display = 'block';\n    out.classList.add('typing');\n    out.textContent = '— sealing inference · TEE attesting · running 5-role consensus...\\n\\n';\n    rcpt.style.display = 'none';\n\n    const prompt = `You are Ivaronix's \"sealed audit\" — a private security review running inside a TEE on 0G Sealed Inference. Audit the code below as if it just ran through 5-role consensus (Analyst, Risk, Evidence, Red-Team, Judge). Output format, plain text, terse:\n\nSEVERITY · ONE-LINE FINDING\n- crisp 1-sentence explanation\n- exploit vector (1 line)\n- recommended fix (1 line)\n\nRepeat for at most 4 findings, sorted high-to-low. Cap at ~140 words total. End with a single line \"VERDICT: <ok|attention|critical>\". Be concrete, technical, no fluff. Do not include preamble or markdown headers.\n\nCODE:\n${code}`;\n\n    try {\n      const res = await window.claude.complete(prompt);\n      out.classList.remove('typing');\n      out.textContent = res.trim();\n      rcptId.textContent = rid();\n      rcpt.style.display = 'block';\n    } catch (e) {\n      out.classList.remove('typing');\n      out.textContent = '— audit failed: ' + (e && e.message || e) + '\\n\\nTry again — the sealed inference layer rate-limits per visitor.';\n    }\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
