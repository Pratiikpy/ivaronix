name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 10.32.1
  NODE_VERSION: 20.x
  FOUNDRY_VERSION: nightly

jobs:
  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      - name: Show Forge version
        run: forge --version
      - name: Install OpenZeppelin into contracts/lib
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-commit
      - name: Build
        working-directory: contracts
        run: forge build --skip test
      - name: Test
        working-directory: contracts
        run: forge test -vvv

  workspace:
    name: Workspace typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all workspace packages
        # Vendored opencode-* packages own their own typecheck shape
        # (txt module declarations etc.). Excluded here to keep the
        # gate strict on first-party code; opencode-* sees its own CI
        # upstream.
        run: pnpm -r --filter "@ivaronix/*" --filter "!@ivaronix/opencode-*" run typecheck
      - name: Build workspace packages (strict)
        # Strict: first-party @ivaronix/* package builds (tsc -b) MUST
        # pass. Catches the bundle-break class — sweep 53 found
        # apps/npx-cli's esbuild step had been silently broken because
        # external: was missing onnxruntime-node + react-devtools-core.
        #
        # Vendored @ivaronix/opencode-* packages excluded (sweep 66):
        # they ship their own .txt module declaration files that
        # tsc --noEmit accepts but tsc -b emit-mode rejects under our
        # workspace tsconfig settings. The vendored code is upstream-
        # owned and runs through its own CI.
        #
        # @ivaronix/studio is built strictly in its own step below
        # (sweep 67 fixed the webpack node:fs scheme + OG-image
        # prerender bugs that previously kept it best-effort).
        run: pnpm -r --filter "@ivaronix/*" --filter "!@ivaronix/opencode-*" --filter "!@ivaronix/studio" run build
      - name: Build npx-cli bundle (strict)
        # Bare-name `ivaronix` package isn't matched by @ivaronix/* filter.
        # Bundle is the npm-publish artifact + the README's Quick Start
        # `npx ivaronix` workflow target — must succeed.
        run: pnpm --filter ivaronix run build
      - name: Build Studio (strict · next build)
        # Sweep 67 made next build deterministic by:
        #   1. Switching apps/studio/src/app/skill/new/page.tsx to
        #      import directly from @ivaronix/skills/manifest (was
        #      pulling node:fs / node:crypto / node:path through the
        #      barrel re-export of loader.ts).
        #   2. Setting `export const dynamic = 'force-dynamic'` on
        #      all three OG-image routes — they fetch fonts at
        #      runtime and can't be statically prerendered.
        # If next build flakes on a future commit, surface it loudly
        # rather than silencing with continue-on-error (sweep 54's
        # original hint).
        run: pnpm --filter @ivaronix/studio run build

  receipt-roundtrip:
    name: Receipt verify roundtrip
    runs-on: ubuntu-latest
    needs: workspace
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify the tracked fixture receipt (V1, id=8)
        # Verify the committed fixture in tests/fixtures/anchored-receipts/.
        # Pre-sweep-75 the job pointed at .ivaronix/receipts/anchored/ which
        # is gitignored — the gate had been a silent no-op for weeks.
        # Runs schema + hash + signature (always offline) AND chain-anchor
        # lookup against Galileo RPC (CI runners reach the public testnet
        # endpoint). NO `|| true` — INVALID/error must fail CI loudly.
        # Per sweep 74's anti-pattern list: silent failures defeat the
        # gate's purpose.
        run: pnpm exec tsx apps/cli/src/bin/ivaronix.ts receipt verify tests/fixtures/anchored-receipts/v1-anchored-id-8.json

  unit-tests:
    # Package-level unit tests via Node's built-in `node:test` runner
    # (tsx --test ...). 5 packages with real test files today: core
    # (jcs canonical-hash · 17 tests), consensus (gates + policy +
    # tier-shape + convergence · 34 tests), receipts (builder +
    # fee-split · 16 tests), skills (manifest schema · 9 tests),
    # memory (encryption · 14 tests). Total ~90 tests across 5
    # packages. Found by the cron-sweep audit on 2026-05-10 — CI
    # had typecheck + build + regression-smokes but no actual unit
    # gate, so a regression in (e.g.) the policy aggregator could
    # have shipped silently.
    name: Package unit tests
    runs-on: ubuntu-latest
    needs: workspace
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: core (JCS + canonical V1/V2 + sha256 + ULID · 52 tests)
        run: pnpm --filter @ivaronix/core test
      - name: consensus (gates + policy + tier-shape + convergence · 34 tests)
        run: pnpm --filter @ivaronix/consensus test
      - name: receipts (builder + fee-split · 16 tests)
        run: pnpm --filter @ivaronix/receipts test
      - name: skills (manifest schema · 9 tests)
        run: pnpm --filter @ivaronix/skills test
      - name: memory (encryption · 14 tests)
        run: pnpm --filter @ivaronix/memory test
      - name: og-chain (deployments walk-up · 8 tests)
        run: pnpm --filter @ivaronix/og-chain test
      - name: og-router (keyring failure-mode taxonomy · 14 tests)
        run: pnpm --filter @ivaronix/og-router test
      - name: og-storage (Burn Mode AES-GCM + nonce regression · 15 tests)
        run: pnpm --filter @ivaronix/og-storage test
      - name: trust-layer (policy evaluator semantics · 17 tests)
        run: pnpm --filter @ivaronix/trust-layer test
      - name: og-kv (InMemoryKvClient + WT-11 honest-stub · 12 tests)
        run: pnpm --filter @ivaronix/og-kv test
      - name: og-da (DaClient surface + size-guard boundary · 14 tests)
        run: pnpm --filter @ivaronix/og-da test
      - name: indexer (SQLite read-replica · CRUD + filters + stats · 19 tests)
        run: pnpm --filter @ivaronix/indexer test
      - name: runtime (json-repair conservative parse · 21 tests)
        run: pnpm --filter @ivaronix/runtime test
      - name: docs:check (numbers.json staleness + marker drift)
        run: pnpm docs:check
      - name: receipt-types:check (RECEIPTS_SPEC §1 vs source enum)
        run: pnpm receipt-types:check
      - name: wording-lint (CLAUDE.md §9 banned words/phrases · gates new drift)
        run: pnpm wording-lint

  regression-smokes:
    # Source-file regression suite. Runs every offline `verify-*.ts`
    # regression that doesn't require Galileo RPC or a running Studio
    # dev server. Closes the silent QA gap (planning-003 §A.1.4) where
    # `pnpm -r test` returned green doing nothing useful.
    name: Source-file regression smokes
    runs-on: ubuntu-latest
    needs: workspace
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Studio source-file regressions
        run: pnpm --filter qa-metamask-e2e run regressions:studio
      - name: CLI source-file regressions
        run: pnpm --filter qa-metamask-e2e run regressions:cli
      - name: Contract source-file regressions
        run: pnpm --filter qa-metamask-e2e run regressions:contracts
