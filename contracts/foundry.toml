[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
auto_detect_solc = false
fs_permissions = [{ access = "read-write", path = "./broadcast" }]

# Mainnet deploy profile. Inherits everything from `default` and flips
# via_ir on for ~20% bytecode reduction. Activate with:
#   FOUNDRY_PROFILE=mainnet forge build
#   FOUNDRY_PROFILE=mainnet forge test
#   FOUNDRY_PROFILE=mainnet forge create ...
# The Galileo testnet deploys stay on the `default` profile (faster
# compile, identical runtime semantics — via_ir is a code-gen pass,
# not a behaviour change). FINAL_BUILD_PLAN.md Block K · sweep series.
[profile.mainnet]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
testnet = "https://evmrpc-testnet.0g.ai"
mainnet = "https://evmrpc.0g.ai"

[etherscan]
testnet = { key = "", url = "https://chainscan-galileo.0g.ai/api", chain = 16602 }
mainnet = { key = "", url = "https://chainscan.0g.ai/api", chain = 16661 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
